<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCS — Key Manager</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #1a1614; --surface: #24201e; --border: #3a3430;
      --text: #f0ebe3; --muted: #a0988a; --accent: #c4a882; --accent-hover: #b39a76;
      --green: #8bba8a; --red: #c77a7a; --amber: #c4a060;
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .wrap { max-width:900px; margin:0 auto; padding:2rem; }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
    .brand { display:flex; align-items:center; gap:0.75rem; }
    .logo { width:36px; height:36px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center; }
    .logo svg { width:20px; height:20px; stroke:var(--bg); }
    h1 { font-size:1.3rem; font-weight:600; }
    .user-info { display:flex; align-items:center; gap:0.75rem; font-size:0.85rem; color:var(--muted); }
    .user-info button { background:none; border:none; color:var(--accent); cursor:pointer; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; }
    .card-title { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:1.25rem; }
    .form-row { display:flex; gap:0.75rem; align-items:flex-end; flex-wrap:wrap; }
    .form-group { display:flex; flex-direction:column; gap:0.35rem; flex:1; min-width:180px; }
    .form-group label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .form-group input,.form-group select { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.9rem; color:var(--text); font-size:0.9rem; outline:none; }
    .form-group input:focus,.form-group select:focus { border-color:var(--accent); }
    .btn { padding:0.6rem 1.4rem; border:none; border-radius:8px; font-size:0.875rem; font-weight:500; cursor:pointer; }
    .btn:hover { opacity:0.85; }
    .btn-primary { background:var(--accent); color:var(--bg); }
    .btn-danger { background:var(--red); color:var(--bg); }
    .btn-sm { padding:0.35rem 0.7rem; font-size:0.78rem; }
    .login-wrap { max-width:360px; margin:4rem auto 0; }
    .login-wrap h2 { text-align:center; margin-bottom:1.5rem; font-size:1.15rem; font-weight:500; }
    .login-wrap .form-group { margin-bottom:1rem; }
    .login-wrap .btn-primary { width:100%; margin-top:0.5rem; padding:0.7rem; }
    .hint { text-align:center; color:var(--muted); font-size:0.78rem; margin-top:0.75rem; }
    .error-line { color:var(--red); font-size:0.83rem; padding:0.4rem 0; text-align:center; min-height:1.4rem; }
    .key-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; margin-bottom:0.65rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .key-card .info { flex:1; }
    .key-name { font-weight:500; margin-bottom:0.2rem; font-size:0.9rem; }
    .key-meta { font-size:0.78rem; color:var(--muted); }
    .badge { display:inline-block; padding:0.2rem 0.55rem; border-radius:999px; font-size:0.65rem; font-weight:600; text-transform:uppercase; }
    .badge-pub { background:rgba(139,186,138,0.12); color:var(--green); border:1px solid rgba(139,186,138,0.25); }
    .badge-sec { background:rgba(196,168,130,0.12); color:var(--accent); border:1px solid rgba(196,168,130,0.25); }
    .badge-rev { background:rgba(199,122,122,0.12); color:var(--red); border:1px solid rgba(199,122,122,0.25); }
    .toast { position:fixed; top:1.25rem; right:1.25rem; background:var(--surface); border:1px solid var(--border); padding:0.85rem 1.25rem; border-radius:10px; z-index:999; transform:translateX(130%); transition:0.3s; max-width:340px; font-size:0.875rem; }
    .toast.show { transform:translateX(0); }
    .toast.success { border-color:var(--green); }
    .toast.error { border-color:var(--red); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:998; display:none; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; max-width:500px; width:92%; }
    .modal h3 { margin-bottom:0.5rem; font-weight:500; }
    .modal .warn { color:var(--amber); font-size:0.8rem; }
    .key-display { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:0.9rem 1rem; word-break:break-all; font-family:monospace; font-size:0.82rem; color:var(--green); margin:1rem 0; user-select:all; }
    .modal-footer { display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1.25rem; }
    .empty,.loading { text-align:center; color:var(--muted); padding:2rem; font-size:0.9rem; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/><path d="M6 12v4l4 2"/></svg></div>
      <h1>MCS Key Manager</h1>
    </div>
    <div class="user-info hidden" id="userInfo">Logged in as <strong id="userName"></strong> <button id="logoutBtn">Logout</button></div>
  </header>

  <div id="loginScreen">
    <div class="card login-wrap">
      <h2>Admin Login</h2>
      <div class="form-group"><label>Username / Phone / Email</label><input type="text" id="loginId" placeholder="admin" autocomplete="username" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password" /></div>
      <div id="loginError" class="error-line"></div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <p class="hint">CEO only: ceo@mothercareschool.com / Ceo@098765</p>
    </div>
  </div>

  <div id="managerScreen" class="hidden">
    <div class="card">
      <div class="card-title">Generate New Key</div>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input type="text" id="keyName" placeholder="e.g. Production Frontend" /></div>
        <div class="form-group" style="flex:0;min-width:150px;"><label>Type</label><select id="keyType"><option value="publishable">Publishable</option><option value="secret">Secret</option></select></div>
        <div class="form-group" style="flex:0;min-width:200px;"><label>Scope</label><select id="keyBranch"><option value="">All Branches (Global)</option></select></div>
        <button class="btn btn-primary" id="generateBtn">Generate</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">API Keys</div>
      <div id="keysList" class="loading">Loading…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Key Generated</h3>
    <p class="warn">⚠ Copy this key now — it will never be shown again.</p>
    <div id="modalKey" class="key-display"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="copyBtn">Copy</button>
      <button class="btn btn-sm" id="doneBtn" style="background:var(--border);color:var(--text);">Done</button>
    </div>
  </div>
</div>

<script>
  // ─── State ──────────────────────────────────────────────
  let jwt = localStorage.getItem('mcs_jwt') || '';
  let newKeyValue = '';

  // ─── Boot ───────────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', function() {
    doLogin();
  });
  document.getElementById('loginId').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginPw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', function() {
    doCreate();
  });

  // Modal buttons
  document.getElementById('copyBtn').addEventListener('click', function() {
    copyKey();
  });
  document.getElementById('doneBtn').addEventListener('click', function() {
    closeModal();
  });

  // Event delegation for dynamically created revoke buttons
  document.getElementById('keysList').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-revoke-id]');
    if (btn) doRevoke(btn.getAttribute('data-revoke-id'), btn.getAttribute('data-revoke-name'));
  });

  // Logout button
  document.getElementById('logoutBtn').addEventListener('click', function() {
    logout();
  });

  // Auto-login if token exists
  if (jwt) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('managerScreen').classList.remove('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    loadBranches();
    loadKeys();
  }

  // ─── Helpers ────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmt(d) { return d ? new Date(d).toLocaleDateString() : '—'; }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt };
  }

  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.classList.remove('show'); }, 4000);
  }

  function handleApiError(status, message) {
    if (status === 401) {
      localStorage.removeItem('mcs_jwt');
      jwt = '';
      document.getElementById('managerScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('userInfo').classList.add('hidden');
      document.getElementById('loginError').textContent = 'Session expired.';
      return;
    }
    if (status === 403) { toast('Access denied.', 'error'); return; }
    toast(message || 'Error', 'error');
  }

  // ─── Login ──────────────────────────────────────────────
  async function doLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value.trim();
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    if (!id || !pw) { errEl.textContent = 'Enter both fields.'; return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier: id, password: pw, rememberMe: true }),
      });
      console.log('Login response status:', res.status);
      const data = await res.json();
      console.log('Login response data:', JSON.stringify(data));

      if (data.success && data.token) {
        jwt = data.token;
        localStorage.setItem('mcs_jwt', jwt);
        // Show manager screen FIRST
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('managerScreen').classList.remove('hidden');
        document.getElementById('userInfo').classList.remove('hidden');
        document.getElementById('userName').textContent = data.user?.name || id;
        // Then load data
        loadBranches();
        loadKeys();
      } else {
        errEl.textContent = data.message || 'Login failed.';
      }
    } catch (err) {
      console.error('Login error:', err);
      errEl.textContent = 'Network error. Check console for details.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showManager() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('managerScreen').classList.remove('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    loadBranches();
  }

  function logout() {
    if (jwt) {
      fetch('/auth/logout', { method: 'POST', headers: authHeaders() }).catch(function() {});
    }
    localStorage.removeItem('mcs_jwt');
    jwt = '';
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('managerScreen').classList.add('hidden');
    document.getElementById('userInfo').classList.add('hidden');
    document.getElementById('keysList').innerHTML = '';
    document.cookie = 'token=; path=/; max-age=0';
    toast('Logged out', 'success');
  }

  // ─── Load Branches ──────────────────────────────────────
  async function loadBranches() {
    try {
      const res = await fetch('/admin/branches', { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) return;
      const branches = data.data || [];
      const sel = document.getElementById('keyBranch');
      sel.innerHTML = '<option value="">All Branches (Global)</option>' +
        branches.filter(function(b) { return b.isActive; }).map(function(b) {
          return '<option value="' + esc(b.code) + '" data-id="' + esc(b.id) + '">' + esc(b.name) + ' (' + esc(b.code) + ')</option>';
        }).join('');
    } catch(e) {}
  }

  // ─── Load Keys ──────────────────────────────────────────
  async function loadKeys() {
    const el = document.getElementById('keysList');
    el.className = 'loading';
    el.textContent = 'Loading…';

    try {
      const res = await fetch('/api-keys', { headers: authHeaders() });
      const data = await res.json();

      if (!res.ok) { handleApiError(res.status, data.message); return; }

      const keys = data.data || [];
      el.className = '';
      if (!keys.length) { el.innerHTML = '<div class="empty">No keys yet.</div>'; return; }

      el.innerHTML = keys.map(function(k) {
        // Extract branch info from prefix
        var parts = (k.prefix || '').split('_');
        var branchCode = parts.length >= 3 ? parts[2] : null;
        var scopeHtml = branchCode && branchCode !== 'global'
          ? ' <span class="badge badge-pub" style="font-size:0.6rem;">' + esc(branchCode) + '</span>'
          : ' <span style="font-size:0.7rem;color:var(--muted);">🌐 Global</span>';

        return '<div class="key-card">' +
          '<div class="info">' +
            '<div class="key-name">' + esc(k.name) +
              ' <span class="badge ' + (k.type === 'publishable' ? 'badge-pub' : 'badge-sec') + '">' + esc(k.type) + '</span>' +
              scopeHtml +
              (k.revokedAt ? ' <span class="badge badge-rev">Revoked</span>' : '') +
            '</div>' +
            '<div class="key-meta">Prefix: <strong>' + esc(k.prefix) + '…</strong> &bull; Created: ' + fmt(k.createdAt) +
              (k.lastUsedAt ? ' &bull; Last used: ' + fmt(k.lastUsedAt) : '') +
            '</div>' +
          '</div>' +
          '<div>' +
            (!k.revokedAt
              ? '<button class="btn btn-danger btn-sm" data-revoke-id="' + esc(k.id) + '" data-revoke-name="' + esc(k.name) + '">Revoke</button>'
              : '<span style="font-size:0.78rem;color:var(--muted);">Revoked</span>'
            ) +
          '</div>' +
        '</div>';
      }).join('');
    } catch (err) {
      el.innerHTML = '<div class="empty">Failed to load keys.</div>';
    }
  }

  // ─── Create Key ─────────────────────────────────────────
  async function doCreate() {
    const name = document.getElementById('keyName').value.trim();
    const type = document.getElementById('keyType').value;
    if (!name) { toast('Enter a name.', 'error'); return; }

    const sel = document.getElementById('keyBranch');
    const branchCode = sel.value || '';
    // Get selected branch ID from option data attribute
    const branchId = sel.options[sel.selectedIndex]?.getAttribute('data-id') || '';

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    try {
      var body = { name: name, type: type };
      if (branchCode && branchId) {
        body.branchCode = branchCode;
        body.branchId = branchId;
      }
      const res = await fetch('/api-keys', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { handleApiError(res.status, data.message); return; }

      newKeyValue = data.key?.key || '';
      document.getElementById('modalKey').textContent = newKeyValue;
      document.getElementById('modal').classList.add('show');
      document.getElementById('keyName').value = '';
      loadKeys();
    } catch (err) {
      toast('Failed.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate';
    }
  }

  // ─── Revoke Key ─────────────────────────────────────────
  async function doRevoke(id, name) {
    if (!confirm('Revoke "' + name + '"?')) return;

    try {
      const res = await fetch('/api-keys/' + id, { method: 'DELETE', headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { handleApiError(res.status, data.message); return; }
      toast('Revoked.', 'success');
      loadKeys();
    } catch (err) {
      toast('Failed.', 'error');
    }
  }

  // ─── Modal ──────────────────────────────────────────────
  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    newKeyValue = '';
  }

  function copyKey() {
    if (newKeyValue) {
      navigator.clipboard.writeText(newKeyValue)
        .then(function() { toast('Copied!', 'success'); });
    }
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
