      summary: GET /
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        '400':
          description: Validation or business rule error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        '401':
          description: Missing or invalid JWT
        '403':
