          type: string
        studentFeeId:
          type: string
        studentId:
          type: string
        amount:
          type: integer
        paymentMethod:
          type: string
        receiptNumber:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
