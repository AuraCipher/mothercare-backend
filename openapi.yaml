openapi: 3.1.0
info:
  title: Mother Care School API
  version: 1.0.0
  description: |
    REST API for Mother Care School ERP — admin, teacher, student, staff portals, chat, and file uploads.
    Responses use `{ success: true, data: … }` on success and `{ success: false, message: "…" }` on error.
    Admin routes require `branchId` and `academicYearId` query params unless embedded in the path.
    Generated from Express route files — run `npm run openapi:generate` to refresh.
  contact:
    name: MCS Development
servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://api.example.com
    description: Production (replace with your API host)

tags:
  - name: Authentication
  - name: Setup
  - name: API Keys
  - name: CEO Invitations
  - name: Canteen
  - name: Results
  - name: Staff RBAC
  - name: Chat Class Roles
  - name: Branches
  - name: Academic Calendars
  - name: Admin ERP
  - name: Teacher Portal
  - name: Student Portal
  - name: Staff Portal
  - name: Chat
  - name: Current User
  - name: Branch Admin
  - name: Uploads
  - name: System

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /auth/login — send as `Authorization: Bearer <token>`
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Username, email, or phone
        password:
          type: string
        rememberMe:
          type: boolean
          default: false
  parameters:
    branchId:
      name: branchId
      in: query
      schema:
        type: string
      description: Active branch scope (most admin ERP routes)
    academicYearId:
      name: academicYearId
      in: query
      schema:
        type: string
      description: Active academic year scope (most admin ERP routes)

