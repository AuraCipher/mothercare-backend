      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true
        academicYearId:
          type: string
      required:
        - id
        - name
        - academicYearId
      additionalProperties: false
    UnarchiveAcademicYearRequest:
      type: object
      properties:
        target:
          type: string
          enum:
            - ON_HOLD
            - BUILD_STAGE
      additionalProperties: false
    UpdateAcademicYearRequest:
      type: object
      properties:
        previousAcademicYearId:
          type: string
      additionalProperties: false
    UpdateAssignmentRequest:
      type: object
      properties:
        isClassTeacher:
          type: boolean
      additionalProperties: false
    UpdateBranchMemberRequest:
