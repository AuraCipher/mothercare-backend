      properties:
        label:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isCurrent:
          type: boolean
      additionalProperties: false
    UpdateExamRequest:
      type: object
      properties:
        name:
          type: string
        examTypeId:
