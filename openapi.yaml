      required:
        - password
      additionalProperties: false
    SetStudentStatusRequest:
      type: object
      properties:
        status:
          type: string
        reason:
          type: string
      required:
        - status
      additionalProperties: false
    Student:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        admissionNumber:
          type: string
          nullable: true
        rollNumber:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        groupId:
          type: string
          nullable: true
        academicYearId:
          type: string
        isActive:
          type: boolean
        status:
          type: string
      required:
        - id
        - name
        - academicYearId
      additionalProperties: false
    StudentDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            admissionNumber:
              type: string
              nullable: true
            rollNumber:
              type: string
              nullable: true
            gender:
              type: string
              nullable: true
            groupId:
              type: string
              nullable: true
            academicYearId:
              type: string
            isActive:
              type: boolean
            status:
              type: string
          required:
            - id
            - name
            - academicYearId
          additionalProperties: false
      required:
        - success
        - data
      additionalProperties: false
    StudentFee:
      type: object
      properties:
        id:
          type: string
        studentId:
          type: string
        academicYearId:
          type: string
        month:
          type: integer
        year:
          type: integer
        netAmount:
          type: integer
        paidAmount:
          type: integer
        status:
          type: string
      required:
        - id
        - studentId
        - academicYearId
        - month
        - year
        - netAmount
        - paidAmount
        - status
      additionalProperties: false
    StudentListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              admissionNumber:
