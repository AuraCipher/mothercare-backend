          type: string
        isOptional:
          type: boolean
        category:
          type: string
          enum:
            - MONTHLY
            - TERM
            - ANNUAL
            - ONE_TIME
            - CUSTOM
      required:
        - name
      additionalProperties: false
    CreateFeeStructureRequest:
      type: object
      properties:
        academicYearId:
          type: string
        groupId:
          type: string
        feeHeadId:
          type: string
        amount:
          type: integer
        effectiveFrom:
          type: string
      required:
        - academicYearId
        - groupId
        - feeHeadId
        - amount
      additionalProperties: false
    CreateSectionRequest:
      type: object
      properties:
        name:
          type: string
        displayOrder:
          type: integer
      required:
        - name
      additionalProperties: false
    CreateStudentRequest:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
          enum:
            - male
            - female
            - other
        dateOfBirth:
          type: string
        religion:
          type: string
        nationality:
          type: string
        address:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
        phone:
          type: string
        bloodGroup:
          type: string
        bformCnic:
          type: string
        motherTongue:
          type: string
        studentEmail:
          type: string
        studentWhatsapp:
          type: string
        previousSchool:
          type: string
        previousClass:
          type: string
        tcNumber:
          type: string
        referredBy:
          type: string
        groupId:
          type: string
        academicYearId:
          type: string
        admissionNumber:
          type: string
        rollNumber:
          type: string
        profilePhotoId:
          type: string
        guardianName:
          type: string
        guardianRelation:
          type: string
      required:
        - name
      additionalProperties: false
    CreateSubjectRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        totalMarks:
          type: integer
        passingMarks:
          type: integer
        isElective:
          type: boolean
        hodId:
          type: string
      required:
        - name
      additionalProperties: false
    CreateTeacherRequest:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        username:
          type: string
        password:
          type: string
        email:
          type: string
        branchId:
          type: string
        employeeId:
          type: string
        qualification:
          type: string
        specialization:
          type: string
        joiningDate:
          type: string
        salary:
          type: number
        phone:
          type: string
        gender:
          type: string
          enum:
            - male
            - female
            - other
        profilePhotoId:
          type: string
      additionalProperties: false
    CustomFeeRequest:
      type: object
      properties:
        customFeeAmount:
          type: integer
          nullable: true
        feeOverrides:
          type: object
          additionalProperties:
            type: number
        concessionReason:
          type: string
      additionalProperties: false
    DeleteAcademicYearRequest:
      type: object
      properties:
        confirmLabel:
          type: string
      additionalProperties: false
    EmergencyContactRequest:
      type: object
      properties:
        name:
          type: string
        relation:
          type: string
        phone:
          type: string
        priority:
          type: integer
      required:
        - name
        - phone
      additionalProperties: false
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
            required:
              - field
              - message
            additionalProperties: false
      required:
        - success
        - message
      additionalProperties: false
    FeeExtraItemRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: integer
        reason:
          type: string
      required:
        - name
        - amount
      additionalProperties: false
    FeeHead:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isOptional:
          type: boolean
        isActive:
          type: boolean
        category:
          type: string
      required:
        - id
        - name
        - isOptional
        - isActive
        - category
      additionalProperties: false
    GenerateStudentFeesRequest:
      type: object
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        academicYearId:
          type: string
        categories:
          type: array
          items:
            type: string
        headIds:
          type: array
          items:
            type: string
        groupIds:
          type: array
          items:
            type: string
        mode:
          type: string
          enum:
            - generate
            - update
            - regenerate
      required:
        - month
        - year
      additionalProperties: false
    GenericDataListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items: {}
      required:
        - success
        - data
      additionalProperties: false
    GenericDataResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data: {}
      required:
        - success
      additionalProperties: false
    HealthRecordRequest:
      type: object
      properties:
        allergies:
          type: string
        medicalConditions:
          type: string
        medications:
          type: string
        doctorName:
          type: string
        doctorPhone:
          type: string
      additionalProperties: false
    JsonObjectRequest:
      type: object
      additionalProperties: {}
    LinkParentRequest:
      type: object
      properties:
        parentUserId:
          type: string
        name:
          type: string
        phone:
          type: string
        relation:
          type: string
        isPrimary:
          type: boolean
      required:
        - relation
      additionalProperties: false
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        rememberMe:
          type: boolean
          default: false
      required:
        - identifier
        - password
      additionalProperties: false
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        token:
          type: string
        rememberMeToken:
          type: string
          nullable: true
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            username:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            role:
              type: string
            status:
              type: string
          required:
            - id
            - name
            - role
          additionalProperties: false
      required:
        - success
        - token
        - user
      additionalProperties: false
    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
