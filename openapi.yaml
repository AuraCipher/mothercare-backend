openapi: 3.1.0
info:
  title: Mother Care School API
  version: 1.0.0
  description: |
    REST API for Mother Care School ERP — admin, teacher, student, staff portals, chat, and file uploads.
    Responses use `{ success: true, data: … }` on success and `{ success: false, message: "…" }` on error.
    Admin routes require `branchId` and `academicYearId` query params unless embedded in the path.
    Generated from Express route files + Zod/schema registry — run `npm run openapi:generate` to refresh.
  contact:
    name: MCS Development
servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://api.example.com
    description: Production (replace with your API host)

tags:
  - name: Authentication
  - name: Setup
  - name: API Keys
  - name: CEO Invitations
  - name: Canteen
  - name: Results
  - name: Staff RBAC
  - name: Chat Class Roles
  - name: Branches
  - name: Academic Calendars
  - name: Admin ERP
  - name: Teacher Portal
  - name: Student Portal
  - name: Staff Portal
  - name: Chat
  - name: Current User
  - name: Branch Admin
  - name: Uploads
  - name: System

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /auth/login — send as Authorization Bearer token header
  parameters:
    branchId:
      name: branchId
      in: query
      schema:
        type: string
      description: Active branch scope (most admin ERP routes)
    academicYearId:
      name: academicYearId
      in: query
      schema:
        type: string
      description: Active academic year scope (most admin ERP routes)
  schemas:
    AcademicYear:
      type: object
      properties:
        id:
          type: string
        branchId:
          type: string
        calendarId:
          type: string
        status:
          type: string
          enum:
            - BUILD_STAGE
            - ON_HOLD
            - ACTIVE
            - ARCHIVED
        previousAcademicYearId:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - branchId
        - calendarId
        - status
      additionalProperties: false
    AcademicYearDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          properties:
            id:
              type: string
            branchId:
              type: string
            calendarId:
              type: string
            status:
              type: string
              enum:
                - BUILD_STAGE
                - ON_HOLD
                - ACTIVE
                - ARCHIVED
            previousAcademicYearId:
              type: string
              nullable: true
            createdAt:
              type: string
            updatedAt:
              type: string
          required:
            - id
            - branchId
            - calendarId
            - status
          additionalProperties: false
      required:
        - success
        - data
      additionalProperties: false
    AcademicYearListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              branchId:
                type: string
              calendarId:
                type: string
              status:
                type: string
                enum:
                  - BUILD_STAGE
                  - ON_HOLD
                  - ACTIVE
                  - ARCHIVED
              previousAcademicYearId:
                type: string
                nullable: true
              createdAt:
                type: string
              updatedAt:
                type: string
            required:
              - id
              - branchId
              - calendarId
              - status
            additionalProperties: false
      required:
        - success
        - data
      additionalProperties: false
    AddAcademicYearMemberRequest:
      type: object
      properties:
        userId:
          type: string
        role:
          type: string
      required:
        - userId
      additionalProperties: false
    AddBranchMemberRequest:
      type: object
      properties:
        userId:
          type: string
        role:
          type: string
        keepTeacherRole:
          type: boolean
      required:
        - userId
        - role
      additionalProperties: false
    AllocatePaymentRequest:
      type: object
      properties:
        studentId:
          type: string
        amount:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        paymentMethod:
          type: string
        reference:
          type: string
        note:
          type: string
        allocations:
          type: array
          items:
            type: object
            properties:
              studentFeeId:
                type: string
              amount:
                type: integer
            required:
              - studentFeeId
              - amount
            additionalProperties: false
      required:
        - studentId
        - amount
        - paymentMethod
      additionalProperties: false
    AuthUserResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            username:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true
            role:
              type: string
            status:
              type: string
            gender:
              type: string
              nullable: true
            dateOfBirth:
              type: string
              nullable: true
            address:
              type: string
              nullable: true
            lastLoginAt:
              type: string
              nullable: true
          required:
            - id
            - name
            - role
          additionalProperties: false
      required:
        - success
        - user
      additionalProperties: false
    BatchAttendanceRequest:
      type: object
      properties:
        date:
          type: string
        records:
          type: array
          items:
            type: object
            properties:
              studentId:
                type: string
              status:
                type: string
              note:
                type: string
            required:
              - studentId
              - status
            additionalProperties: false
      required:
        - date
        - records
      additionalProperties: false
    Branch:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required:
        - id
        - name
        - code
      additionalProperties: false
    Calendar:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isCurrent:
          type: boolean
      required:
        - id
        - label
        - startDate
        - endDate
        - isCurrent
      additionalProperties: false
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 6
        newPassword:
          type: string
          minLength: 8
          allOf:
            - pattern: "[A-Z]"
            - pattern: "[0-9]"
        confirmPassword:
          type: string
      required:
        - currentPassword
        - newPassword
        - confirmPassword
      additionalProperties: false
    CreateAcademicYearRequest:
      type: object
      properties:
        calendarId:
          type: string
        previousAcademicYearId:
          type: string
        directToArchived:
          type: boolean
      required:
        - calendarId
      additionalProperties: false
    CreateAssignmentRequest:
      type: object
      properties:
        academicYearId:
          type: string
        teacherId:
          type: string
        groupId:
          type: string
        subjectId:
          type: string
        isClassTeacher:
          type: boolean
        role:
          type: string
      required:
        - academicYearId
        - teacherId
        - groupId
        - subjectId
      additionalProperties: false
    CreateBranchRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        logoUrl:
          type: string
      required:
        - name
        - code
      additionalProperties: false
    CreateCalendarRequest:
      type: object
      properties:
        label:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isCurrent:
          type: boolean
      required:
        - label
        - startDate
        - endDate
      additionalProperties: false
    CreateExamRequest:
      type: object
      properties:
        name:
          type: string
        examTypeId:
          type: string
        weightOverride:
          type: number
        startDate:
          type: string
        endDate:
          type: string
      required:
        - name
        - examTypeId
        - startDate
      additionalProperties: false
    CreateExamSessionRequest:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
      required:
        - name
        - startDate
        - endDate
      additionalProperties: false
    CreateExamTypeRequest:
      type: object
      properties:
        name:
          type: string
        defaultWeight:
          type: number
      required:
        - name
      additionalProperties: false
    CreateFeeHeadRequest:
      type: object
