        studentFeeId:
          type: string
        amount:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        paymentMethod:
          type: string
        reference:
          type: string
        note:
          type: string
      required:
        - studentFeeId
        - amount
        - paymentMethod
      additionalProperties: false
    SetPasswordRequest:
      type: object
      properties:
        password:
          type: string
